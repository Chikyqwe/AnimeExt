<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reproductor — AnimeEXT</title>

  <!-- Bootstrap -->
  <link href="./static/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="./static/font-awesome/all.min.css" rel="stylesheet" />
  <link href="./static/bootstrap/css/bootstrap-icons.css" rel="stylesheet" />

  <!-- HLS + Plyr -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link  rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <!-- AnimeEXT styles -->
  <link rel="stylesheet" href="./static/styles.css" />
  <link rel="stylesheet" href="./static/styles_player.css" />
  <link rel="stylesheet" href="./static/styles_shared.css" />
  <link rel="stylesheet" href="./static/styles_modal.css" />
  <link rel="stylesheet" href="./static/styles_light.css" />
</head>
<body style="overflow-x:hidden;">

  <!-- Offline overlay -->
  <div id="offlineOverlay" class="hidden">
    <svg fill="#00d9c0" viewBox="-3.6 -3.6 43.20 43.20" xmlns="http://www.w3.org/2000/svg" width="72" height="72">
      <path d="M18,24.42a4,4,0,1,0,4,4A4,4,0,0,0,18,24.42Zm0,6a2,2,0,1,1,2-2A2,2,0,0,1,18,30.42Z"/>
      <path d="M26.21,21.85a1,1,0,0,0-.23-1.4,13.56,13.56,0,0,0-5-2.23l3.87,3.87A1,1,0,0,0,26.21,21.85Z"/>
      <path d="M18.05,10.72a20.88,20.88,0,0,0-4.16.43l1.74,1.74a19,19,0,0,1,2.42-.17A18.76,18.76,0,0,1,28.64,16a1,1,0,0,0,1.12-1.65A20.75,20.75,0,0,0,18.05,10.72Z"/>
      <path d="M33.55,8.2A28.11,28.11,0,0,0,8.11,5.36L9.69,6.93A26,26,0,0,1,32.45,9.87a1,1,0,0,0,1.1-1.67Z"/>
      <path d="M1.84,4.75,4.27,7.18c-.62.34-1.23.7-1.83,1.1A1,1,0,1,0,3.56,9.94C4.26,9.47,5,9,5.74,8.65l3.87,3.87A20.59,20.59,0,0,0,6.23,14.4,1,1,0,0,0,7.36,16a18.82,18.82,0,0,1,3.77-2l4.16,4.16A13.51,13.51,0,0,0,10,20.55a1,1,0,0,0,1.18,1.61A11.52,11.52,0,0,1,17,20l10.8,10.8,1.41-1.41-26-26Z"/>
    </svg>
    <h2>Sin conexión</h2>
    <p>Para usar AnimeEXT necesitas conexión a internet.</p>
  </div>

  <div id="mainContent">

    <!-- Topbar -->
    <header class="topbar d-flex align-items-center" id="topbar">
      <a href="/" class="logo">
        <svg viewBox="0 0 260 80" class="logo-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <text x="8" y="44" font-family="Outfit, sans-serif" font-size="34" font-weight="800" letter-spacing="-1">
            <tspan class="main-text">Anime </tspan><tspan class="ext-text">EXT</tspan>
          </text>
          <text x="8" y="66" font-family="Noto Serif JP, serif" font-size="12" class="subtext">アニメが好きな私たち</text>
        </svg>
      </a>

      <form class="search-form d-flex ms-auto align-items-center" role="search" onsubmit="searchAnime(event)">
        <button type="button" id="search-toggle-btn" class="btn-search d-md-none">
          <i class="fa fa-search"></i>
        </button>
        <div class="position-relative d-none d-md-flex align-items-center">
          <span class="search-icon-wrap"><i class="fa fa-search"></i></span>
          <input
            id="searchInput"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            type="search"
            placeholder="Buscar anime..."
            aria-label="Buscar"
          />
        </div>
        <button type="button" id="search-close-btn"><i class="fa fa-times"></i></button>
        <ul id="search-suggestions" class="suggestions-list"></ul>
      </form>
    </header>

    <!-- Player container -->
    <div class="container-player">
      <h1 id="anime-title">Cargando...</h1>

      <div class="video-wrapper position-relative">
        <!-- Loader overlay -->
        <div class="loader" id="loader">
          <div class="loader-ring"></div>
          <span id="loaderText">Cargando stream...</span>
        </div>

        <video id="player" playsinline preload="auto" crossorigin="anonymous"></video>

        <div id="infoOverlay">
          <span id="animeTitleDisplay">Anime</span>
          <span id="currentTimeDisplay">00:00</span>
        </div>
      </div>

      <!-- Server selector -->
      <div id="serverButtons" class="my-3 text-center"></div>

      <!-- Prev / Next -->
      <div class="nav-buttons" id="nav-buttons"></div>

      <!-- Episode list -->
      <div class="episode-list">
        <h5>Lista de Episodios</h5>
        <div class="d-flex flex-wrap justify-content-center gap-2" id="episode-list"></div>
      </div>
    </div>

    <!-- Anime info modal -->
    <div class="modal fade" id="animeModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" id="modalCloseBtn" data-bs-dismiss="modal" aria-label="Cerrar"
              style="background: none; border: none; font-size: 1.4rem;">
              <i class="fa fa-xmark" style="color: var(--text-secondary);"></i>
            </button>
          </div>
          <div class="modal-body">
            <div class="modal-left">
              <div id="modalImgWrapper" class="modal-img-wrapper">
                <img id="modalImage" class="modal-img" src="" alt="Anime" />
              </div>
              <div id="ratingBox" class="rating-box">
                <div class="rating-score" id="ratingScore">0.0</div>
                <div class="rating-stars" id="ratingStars"></div>
              </div>
              <div class="d-flex justify-content-between align-items-center gap-2 w-100">
                <button id="favoriteBtn" class="btn btn-outline-light flex-fill">
                  <i class="fa fa-heart me-1"></i> Favoritos
                </button>
                <button id="shareBtn" class="btn btn-outline-light flex-fill">
                  <i class="fa fa-share-alt me-1"></i> Compartir
                </button>
              </div>
            </div>
            <div class="modal-info">
              <h2 id="modalTitle" class="modal-title"></h2>
              <div class="modal-description">
                <h3 class="description-title">Descripción</h3>
                <p id="modalDescription" class="description-text"></p>
              </div>
              <div id="episodes-list" class="episodes-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Share modal -->
    <div class="modal-share" id="modalShare">
      <div class="modal-share__container">
        <div class="modal-share__header">Compartir</div>
        <div class="modal-share__close" id="closeModal">&times;</div>
        <div class="share-options-wrapper">
          <div class="share-options" id="shareOptions">
            <a href="#" class="share-option">
              <div class="share-option__icon pinterest"><i class="bi bi-pinterest"></i></div>
              <span>Pinterest</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon whatsapp"><i class="fab fa-whatsapp"></i></div>
              <span>WhatsApp</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon facebook"><i class="fab fa-facebook-f"></i></div>
              <span>Facebook</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon correo"><i class="fas fa-envelope"></i></div>
              <span>Correo</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon telegram"><i class="bi bi-telegram"></i></div>
              <span>Telegram</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon reddit"><i class="bi bi-reddit"></i></div>
              <span>Reddit</span>
            </a>
            <a href="#" class="share-option">
              <div class="share-option__icon x"><i class="bi bi-twitter-x"></i></div>
              <span>X</span>
            </a>
          </div>
          <button class="scroll-btn" id="scrollRight"><i class="fas fa-angle-right"></i></button>
        </div>
        <div class="modal-share__link-box">
          <input type="text" id="shareLink" class="modal-share__input" readonly />
          <button class="modal-share__copy-btn" id="copyBtn">Copiar</button>
        </div>
      </div>
    </div>

    <!-- Config (populated by server) -->
    <script id="config" type="application/json"></script>
    <script src="static/player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      /* Eruda debug loader — only activates with ?debug=180&er=true */
      (function () {
        try {
          const p = new URLSearchParams(window.location.search);
          if (p.get('debug') === '180' && p.get('er') === 'true') {
            if (window.eruda) return;
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/eruda';
            s.async = true;
            s.onload  = () => window.eruda?.init?.();
            s.onerror = () => console.warn('No se pudo cargar eruda.');
            document.head.appendChild(s);
          }
        } catch (e) {
          console.error('Eruda loader error:', e);
        }
      })();
    </script>
  </div>
</body>
</html>
